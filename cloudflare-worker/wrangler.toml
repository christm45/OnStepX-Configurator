name = "onstepx-build-bridge"
main = "worker.js"
compatibility_date = "2025-01-01"

# Public (non-secret) configuration. Edit these before deploying.
[vars]
BUILD_OWNER = "christm45"
BUILD_REPO = "onstepx-build-service"
ALLOWED_ORIGIN = "https://christm45.github.io"

# Optional KV namespace for rate limiting. Uncomment after creating with:
#   wrangler kv:namespace create RATE_LIMIT
# Then paste the id here.
# [[kv_namespaces]]
# binding = "RATE_LIMIT"
# id = "<kv-namespace-id>"

# Secrets (do NOT put these here — use `wrangler secret put`):
#
# Mode A: GitHub App (recommended, no rotation needed) — set ALL THREE:
#   GH_APP_ID              — numeric App ID from the App's settings page
#   GH_APP_PRIVATE_KEY     — PKCS#8 PEM ("BEGIN PRIVATE KEY"). Convert from
#                            GitHub's PKCS#1 default with:
#                              openssl pkcs8 -topk8 -nocrypt -in raw.pem -out app.pem
#   GH_APP_INSTALLATION_ID — numeric ID from the App's installation on the
#                            build-service repo
#
# Mode B: Personal Access Token (legacy, expires every 90 days):
#   GITHUB_TOKEN  — fine-grained PAT, Actions:write + Contents:read on BUILD_REPO
#
# The Worker auto-prefers App mode if all three Mode A secrets are present;
# otherwise it falls back to GITHUB_TOKEN. Hit GET /auth-info on the deployed
# Worker to see which mode is currently active.
